<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atlético La Garena - Evolution</title>
    <style>
        body { background: #111; color: white; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
        #menu { position: absolute; background: linear-gradient(135deg, #1a1a1a, #4a148c); width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px 0; }
        
        #path-container { position: relative; width: 350px; margin: 10px 0; display: flex; flex-direction: column; align-items: center; }
        .path-line { position: absolute; width: 4px; border-left: 4px dotted gold; height: 90%; z-index: 0; opacity: 0.3; }
        .node { position: relative; z-index: 1; margin: 5px 0; }
        .node:nth-child(even) { transform: translateX(50px); }
        .node:nth-child(odd) { transform: translateX(-50px); }

        .btn { background: gold; color: #4a148c; padding: 10px 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; min-width: 140px; font-size: 0.75rem; box-shadow: 0 4px 0 #b8860b; }
        .locked { background: #444; color: #888; cursor: not-allowed; box-shadow: none; filter: grayscale(1); }

        #upgrade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px; max-width: 600px; }
        .up-card { background: rgba(255,255,255,0.1); padding: 5px; border-radius: 10px; border: 1px solid gold; text-align: center; font-size: 0.6rem; }
        .up-btn { background: #4caf50; color: white; border: none; padding: 3px; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 4px; font-weight: bold; }

        #draft-zone { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 15px; border: 2px solid white; margin-bottom: 5px; }
        .draft-item { display: inline-block; padding: 4px; border: 2px solid white; margin: 2px; cursor: pointer; border-radius: 8px; width: 65px; font-size: 0.55rem; text-align: center; }
        .selected-draft { border-color: gold; background: #6a1b9a; }

        #game-ui { display: none; background: #222; width: 100%; max-width: 1200px; height: 8vh; padding: 0 20px; justify-content: space-around; align-items: center; border-bottom: 2px solid gold; box-sizing: border-box; }
        #shop { display: none; background: #111; width: 100%; max-width: 1200px; height: 12vh; padding: 5px; gap: 8px; justify-content: center; border-top: 3px solid gold; box-sizing: border-box; }
        .card { width: 85px; background: white; color: black; border-radius: 5px; cursor: pointer; text-align: center; font-size: 9px; padding: 4px; border: 2px solid transparent; }
        .active-card { border-color: gold; background: #e1bee7; }
        
        canvas { background: #2e7d32; display: none; height: 80vh; max-width: 100vw; object-fit: contain; }
        #overlay { position: absolute; top: 30%; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; display: none; z-index: 200; color: gold; border: 4px solid gold; text-align: center; width: 350px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: gold; margin: 0; font-size: 1.4rem;">ATLÉTICO LA GARENA</h1>
    <div id="league-name" style="color: #00e5ff; font-size: 1rem; margin-top: 5px;">TORNEO: LIGA LOCAL</div>
    <div id="coins-display" style="font-size: 1.1rem; margin: 5px;">⚽ MONEDAS: 100</div>

    <div id="path-container">
        <div class="path-line"></div>
        <div class="node"><button id="p1" class="btn" onclick="startCheck(1)">PARTIDO 1</button></div>
        <div class="node"><button id="p2" class="btn locked">PARTIDO 2</button></div>
        <div class="node"><button id="p3" class="btn locked">PARTIDO 3</button></div>
        <div class="node"><button id="p4" class="btn locked">GRAN FINAL</button></div>
    </div>

    <div id="draft-zone">
        <h4 style="margin: 3px; font-size: 0.8rem;">CONVOCATORIA (ELIGE 4)</h4>
        <div id="pool"></div>
    </div>

    <div id="upgrade-grid">
        <div class="up-card"><b>DEL</b><br><span id="lv-striker">Nv. 0</span><button id="btn-striker" class="up-btn" onclick="buyUp('striker')">25</button></div>
        <div class="up-card"><b>MED</b><br><span id="lv-mid">Nv. 0</span><button id="btn-mid" class="up-btn" onclick="buyUp('mid')">25</button></div>
        <div class="up-card"><b>DEF</b><br><span id="lv-def">Nv. 0</span><button id="btn-def" class="up-btn" onclick="buyUp('def')">25</button></div>
        <div class="up-card"><b>HIN</b><br><span id="lv-cheer">Nv. 0</span><button id="btn-cheer" class="up-btn" onclick="buyUp('cheer')">25</button></div>
        <div class="up-card"><b>LAT</b><br><span id="lv-lat">Nv. 0</span><button id="btn-lat" class="up-btn" onclick="buyUp('lat')">50</button></div>
    </div>
</div>

<div id="overlay"></div>
<div id="game-ui">
    <span>🥤 <span id="energy">100</span></span>
    <span>⚽ <span id="coins-hud">0</span></span>
    <span id="match-info" style="color: gold; font-weight: bold;">PARTIDO 1 - OLEADA 1/5</span>
    <div>
        <button style="background:red; color:white; border:none; padding:6px; border-radius:5px; cursor:pointer;" onclick="usePower('redcard')">🟥</button>
        <button style="background:orange; color:white; border:none; padding:6px; border-radius:5px; cursor:pointer;" onclick="usePower('fire')">🔥</button>
    </div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="shop"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ROWS = 5, CELL_W = 110, CELL_H = 100, OFFSET_X = 140, COLS = 9;
canvas.width = (CELL_W * COLS) + OFFSET_X;
canvas.height = ROWS * CELL_H;

let globalCoins = 100;
let unlockedMatch = 1;
const leagueNames = ["LIGA LOCAL", "LIGA LOCAL", "COPA REGIONAL", "NACIONAL", "ELITE CHAMPIONS"];

let teamPool = [
    {id:'striker', n:'DELANTERO', icon:'👟', cost:50},
    {id:'midfielder', n:'MEDIO', icon:'⚽', cost:75},
    {id:'defender', n:'DEFENSA', icon:'🛡️', cost:100},
    {id:'cheerleader', n:'HINCHADA', icon:'📣', cost:25},
    {id:'lateral', n:'LATERAL', icon:'⚡', cost:125},
    {id:'extremo', n:'EXTREMO', icon:'🧨', cost:150}
];
let selectedTeam = [];
let upgrades = { striker:0, mid:0, def:0, cheer:0, lat:0 };

const poolDiv = document.getElementById('pool');
teamPool.forEach(p => {
    const d = document.createElement('div');
    d.className = 'draft-item';
    d.innerHTML = `👕${p.icon}<br>${p.n}`;
    d.onclick = () => {
        if(selectedTeam.includes(p)) { selectedTeam = selectedTeam.filter(i=>i!==p); d.classList.remove('selected-draft'); }
        else if(selectedTeam.length < 4) { selectedTeam.push(p); d.classList.add('selected-draft'); }
    };
    poolDiv.appendChild(d);
});

function buyUp(t) {
    let lv = upgrades[t];
    let price = (t === 'lat') ? (50 + lv * 25) : (25 + lv * 25);
    if(globalCoins >= price) { globalCoins -= price; upgrades[t]++; refreshMenu(); }
}

function refreshMenu() {
    document.getElementById('coins-display').innerText = "⚽ MONEDAS: " + globalCoins;
    document.getElementById('league-name').innerText = "TORNEO: " + leagueNames[unlockedMatch];
    ['striker', 'mid', 'def', 'cheer', 'lat'].forEach(t => {
        let lv = upgrades[t];
        document.getElementById(`lv-${t}`).innerText = "Nv. " + lv;
        let nextPrice = (t === 'lat') ? (50 + lv * 25) : (25 + lv * 25);
        document.getElementById(`btn-${t}`).innerText = "Coste: " + nextPrice;
    });
    for(let i=1; i<=4; i++) {
        let b = document.getElementById('p'+i);
        if(i <= unlockedMatch) { b.classList.remove('locked'); b.onclick=()=>startCheck(i); }
    }
}

function startCheck(idx) { if(selectedTeam.length < 4) return alert("Elige 4 jugadores"); currentMatch = idx; startGame(); }

let energy, currentWave, currentMatch, matchDefeated, isRunning = false;
let units, enemies, projectiles, drops, mowers, selectedUnit, frameCount = 0;

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
    document.getElementById('shop').style.display = 'flex';
    canvas.style.display = 'block';
    const shopDiv = document.getElementById('shop'); shopDiv.innerHTML = '';
    selectedTeam.forEach(p => {
        const c = document.createElement('div');
        c.className = 'card';
        let finalCost = p.id === 'lateral' ? Math.max(50, p.cost - (upgrades.lat*5)) : p.cost;
        c.innerHTML = `👕${p.icon}<br>${p.n}<br><b>🥤${finalCost}</b>`;
        c.onclick = () => { selectedUnit = {...p, finalCost}; document.querySelectorAll('.card').forEach(x=>x.classList.remove('active-card')); c.classList.add('active-card'); };
        shopDiv.appendChild(c);
    });
    currentWave = 1; energy = 100; frameCount = 0; resetField();
    isRunning = true; requestAnimationFrame(update);
}

function resetField() {
    units = []; enemies = []; projectiles = []; drops = []; mowers = [];
    for(let i=0; i<ROWS; i++) mowers.push({x: 50, y: i*CELL_H, row: i, active: true});
    matchDefeated = 0; startWave();
}

function startWave() { showMsg(`PARTIDO ${currentMatch}<br>OLEADA ${currentWave}/5`, 2000); }

function drawStadium() {
    switch(currentMatch) {
        case 1: // Campo de barrio
            ctx.fillStyle = "#8d6e63"; ctx.fillRect(OFFSET_X, 0, canvas.width, canvas.height); // Tierra
            ctx.fillStyle = "#4caf50"; // Parches de hierba
            for(let i=0; i<20; i++) ctx.fillRect(OFFSET_X + (i*60)%700, (i*110)%500, 40, 20);
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; break;
        case 2: // Polideportivo
            ctx.fillStyle = "#388e3c"; ctx.fillRect(OFFSET_X, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "white"; break;
        case 3: // Estadio Municipal
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(OFFSET_X, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1b5e20"; // Franjas
            for(let i=0; i<COLS; i+=2) ctx.fillRect(OFFSET_X + i*CELL_W, 0, CELL_W, canvas.height);
            ctx.strokeStyle = "white"; break;
        case 4: // Champions
            ctx.fillStyle = "#1b5e20"; ctx.fillRect(OFFSET_X, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "gold"; // Líneas de oro
            ctx.lineWidth = 3;
            ctx.strokeRect(OFFSET_X+10, 10, canvas.width-OFFSET_X-20, canvas.height-20);
            break;
    }
    // Dibujar cuadrícula
    ctx.lineWidth = 1;
    for(let r = 0; r < ROWS; r++) {
        for(let c = 0; c < COLS; c++) { ctx.strokeRect(OFFSET_X + (c * CELL_W), r * CELL_H, CELL_W, CELL_H); }
    }
}

class Unit {
    constructor(x, y, data) {
        this.x = x; this.y = y; this.type = data.id; this.timer = 0;
        let hpBase = (data.id === 'defender') ? 600 : 150;
        let hpMod = (data.id === 'defender') ? (1+upgrades.def*0.2) : (data.id === 'midfielder' ? (1+upgrades.mid*0.15) : 1);
        this.hp = hpBase * hpMod;
    }
    draw() {
        ctx.font = "45px Arial"; ctx.fillText("👕", this.x+25, this.y+65);
        ctx.font = "20px Arial"; ctx.fillText({striker:'👟', lateral:'⚡', extremo:'🧨', defender:'🛡️', cheerleader:'📣', midfielder:'⚽'}[this.type], this.x+55, this.y+85);
    }
}

function update() {
    if(!isRunning) return;
    frameCount++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,OFFSET_X,canvas.height); // Grada/Banquillo
    
    drawStadium();

    mowers.forEach(m => {
        if(m.active) { ctx.font="35px Arial"; ctx.fillText("🧤", m.x, m.y+65); }
        else if(m.x < canvas.width) {
            m.x += 15; ctx.font="35px Arial"; ctx.fillText("🧤🏃", m.x, m.y+65);
            enemies.forEach((en, i) => { if(en.row === m.row && Math.abs(en.x - m.x) < 50) { enemies.splice(i, 1); matchDefeated++; } });
        }
    });

    // RIVALES: Menos cantidad base, sube por partido y oleada
    let waveTotal = (1 + currentMatch) + (currentWave * 1); 
    let spawnRate = 0.008 + (currentWave * 0.005);
    if(enemies.length + matchDefeated < waveTotal && Math.random() < spawnRate) {
        let r = Math.random();
        enemies.push({x:canvas.width, row:Math.floor(Math.random()*ROWS), hp: (r>0.8?150:75), speed:0.5+(currentMatch*0.2)+(currentWave*0.1), type:r>0.8?'tank':'normal'});
    }

    units.forEach((u, idx) => {
        u.draw(); u.timer++;
        if(u.type === 'extremo' && u.timer > 60) {
            ctx.fillStyle="rgba(255,165,0,0.6)"; ctx.beginPath(); ctx.arc(u.x+55, u.y+55, 120, 0, Math.PI*2); ctx.fill();
            enemies = enemies.filter(en => { if(Math.hypot(en.x-u.x, (en.row*CELL_H)-u.y) < 170) { matchDefeated++; return false; } return true; });
            units.splice(idx, 1);
        } else {
            let fireRate = Math.max(30, 100 - (upgrades.striker * 5));
            if(['striker', 'lateral', 'midfielder'].includes(u.type) && u.timer % Math.floor(fireRate) === 0) projectiles.push({x:u.x+70, y:u.y+55, row:Math.floor(u.y/CELL_H)});
            let cheerRate = Math.max(60, 200 - (upgrades.cheer * 15));
            if(u.type==='cheerleader' && u.timer % Math.floor(cheerRate) === 0) drops.push({x:u.x+20, y:u.y+20, timer:300});
        }
    });

    for(let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i]; p.x += 8; ctx.fillText("⚽", p.x, p.y);
        let hit = false;
        for(let ei = enemies.length - 1; ei >= 0; ei--) {
            let en = enemies[ei];
            if(en.row === p.row && Math.abs(en.x - p.x) < 35) {
                en.hp -= 25; projectiles.splice(i, 1); hit = true;
                if(en.hp <= 0) { enemies.splice(ei, 1); matchDefeated++; } break; 
            }
        }
        if(!hit && p.x > canvas.width) projectiles.splice(i, 1);
    }

    enemies.forEach((en, i) => {
        ctx.font="45px Arial"; ctx.fillText(en.type==='tank'?"🤰🏃":"🏃", en.x, (en.row*CELL_H)+70);
        let b = units.find(u => Math.floor(u.y/CELL_H) === en.row && Math.abs(en.x - (u.x+55)) < 30);
        if(b) { b.hp -= 1; if(b.hp<=0) units=units.filter(x=>x!==b); } else en.x -= en.speed;
        if(en.x < OFFSET_X && mowers[en.row].active) mowers[en.row].active = false;
        if(en.x < 10) { isRunning=false; showMsg("GOL EN CONTRA", 3000); setTimeout(()=>location.reload(), 3000); }
    });

    if(frameCount % 800 === 0) drops.push({x:Math.random()*(canvas.width-OFFSET_X-50)+OFFSET_X, y:Math.random()*(canvas.height-50), timer:400});
    drops.forEach((d, i) => { ctx.font="28px Arial"; ctx.fillText("🥤", d.x, d.y); d.timer--; if(d.timer<0) drops.splice(i, 1); });

    document.getElementById('energy').innerText = Math.floor(energy);
    document.getElementById('coins-hud').innerText = globalCoins;
    document.getElementById('match-info').innerText = `PARTIDO ${currentMatch} - OLEADA ${currentWave}/5`;
    
    if(matchDefeated >= waveTotal && enemies.length === 0) {
        if(currentWave < 5) { currentWave++; startWave(); matchDefeated=0; }
        else { 
            isRunning=false; unlockedMatch = Math.max(unlockedMatch, currentMatch + 1); globalCoins += 50;
            showMsg("¡PARTIDO GANADO!", 4000); setTimeout(()=>{document.getElementById('menu').style.display='flex'; refreshMenu();}, 4000); 
        }
    }
    if(isRunning) requestAnimationFrame(update);
}

canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect(); 
    const mx = (e.clientX - r.left) * (canvas.width / r.width), my = (e.clientY - r.top) * (canvas.height / r.height);
    for (let i = drops.length - 1; i >= 0; i--) { if (Math.hypot(drops[i].x - mx, drops[i].y - my) < 50) { energy += 25; drops.splice(i, 1); return; } }
    if(mx > OFFSET_X && selectedUnit && energy >= selectedUnit.finalCost) {
        const gx = Math.floor((mx-OFFSET_X)/CELL_W)*CELL_W+OFFSET_X, gy = Math.floor(my/CELL_H)*CELL_H;
        if(!units.find(u=>u.x===gx && u.y===gy)) { units.push(new Unit(gx, gy, selectedUnit)); energy -= selectedUnit.finalCost; }
    }
});

function usePower(t) { if(t==='redcard' && globalCoins>=50 && enemies.length > 0) { enemies.shift(); globalCoins-=50; } if(t==='fire' && globalCoins>=200) { enemies=[]; globalCoins-=200; } }
function showMsg(t, time) { const o = document.getElementById('overlay'); o.innerHTML = t; o.style.display = 'block'; setTimeout(() => o.style.display = 'none', time); }

refreshMenu();
</script>
</body>
</html>
